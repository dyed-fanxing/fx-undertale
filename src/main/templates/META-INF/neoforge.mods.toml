# 这是一个 mods.toml 示例文件，包含与加载模组相关的数据。
# 其中有几个必填字段（#mandatory），以及更多可选字段（#optional）。
# 整体格式为标准 TOML 格式，v0.5.0。
# 注意此文件中包含几个 TOML 列表。
# 有关 toml 格式的更多信息，请访问：https://github.com/toml-lang/toml
# 要加载的模组加载器类型名称 - 对于常规 FML @Mod 模组，应为 javafml
modLoader = "javafml" #（必填）
# 要匹配的模组加载器版本范围 - 对于常规 FML @Mod，将是 FML 版本。当前为 47。
loaderVersion = "${loader_version_range}" #（必填）
# 您的模组的许可证。这是必填的元数据，便于理解您的再分发属性。
# 请在此处查看您的选项：https://choosealicense.com/。“保留所有权利”是默认的版权立场，因此也是此处的默认值。
license = "${mod_license}"
# 当此模组出现问题时，指引用户参考的 URL
#issueTrackerURL="https://change.me.to.your.issue.tracker.example.invalid/" #（可选）
# 模组列表 - 允许的数量由各个模组加载器决定
[[mods]] #（必填）
# 模组的 modid
modId = "${mod_id}" #（必填）
# 模组的版本号
version = "${mod_version}" #（必填）
# 模组的显示名称
displayName = "${mod_name}" #（必填）
# 用于查询此模组更新的 URL。请参阅 JSON 更新规范：https://docs.neoforge.net/docs/misc/updatechecker/
#updateJSONURL="https://change.me.example.invalid/updates.json" #（可选）
# 此模组的“主页”URL，显示在模组 UI 中
#displayURL="https://change.me.to.your.mods.homepage.example.invalid/" #（可选）
# 包含显示徽标的文件名称（位于模组 JAR 的根目录中）
#logoFile="example.png" #（可选）
# 显示在模组 UI 中的文本字段
#credits="" #（可选）
# 显示在模组 UI 中的文本字段
authors = "${mod_authors}" #（可选）

# 模组的描述文本（多行！）（#必填）
description = '''${mod_description}'''


enumExtensions = "META-INF/enumextensions.json"
# [[mixins]] 块允许您向 FML 声明您的 mixin 配置，以便加载它。
[[mixins]]
config = "fx_undertale.mixins.json"

# [[accessTransformers]] 块允许您声明您的 AT 文件位置。
# 如果省略此块，将尝试回退从 META-INF/accesstransformer.cfg 加载 AT
#[[accessTransformers]]
#file="META-INF/accesstransformer.cfg"

# coremods 配置文件路径不可配置，始终从 META-INF/coremods.json 加载

# 依赖项 - 使用 . 表示对特定 modid 的依赖。依赖项是可选的。
[[dependencies."${mod_id}"]] #（可选）
# 依赖项的 modid
modId = "neoforge" #（必填）
# 依赖项的类型。可以是 "required"（必需）、"optional"（可选）、"incompatible"（不兼容）或 "discouraged"（不推荐）（不区分大小写）。
# 'required' 要求模组必须存在，'optional' 则不要求
# 'incompatible' 会在模组存在时阻止游戏加载，'discouraged' 会显示警告
type = "required" #（必填）
# 说明依赖项为何必需或为何不兼容的可选字段
# reason="..."
# 依赖项的版本范围
versionRange = "${neo_version_range}" #（必填）
# 依赖项的排序关系。
# BEFORE - 此模组在依赖项之前加载
# AFTER - 此模组在依赖项之后加载
ordering = "NONE"
# 应用此依赖项的一方 - BOTH（双方）、CLIENT（客户端）或 SERVER（服务端）
side = "BOTH"
# 这是另一个依赖项
[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
# 此版本范围声明了从当前 Minecraft 版本开始到下一个主要版本之前的最低版本要求
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Features 是游戏环境的特定属性，您可能需要声明您的要求。此示例声明
# 您的模组需要 GL 版本 3.2 或更高。将会添加其他 features。它们具有端感知能力，因此声明此项不会
# 阻止您的模组在服务器上加载。
#[features."${mod_id}"]
#openGLVersion="[3.2,)"