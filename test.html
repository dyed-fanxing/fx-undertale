<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>地脉波动 · 唯一避难所 | 2D躲避游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a, #03010a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', monospace;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            max-height: 900px;
            background: #010008;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .info-card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 40px;
            border-left: 4px solid #ff8844;
            color: #ffdd99;
            font-size: 14px;
            font-weight: bold;
        }

        .score-card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 28px;
            border-radius: 40px;
            color: #ffaa44;
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
        }

        .message {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            color: #ffaa66;
            font-size: 18px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid #ff8844;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
        }

        .controls-tip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 30px;
            color: #88ffaa;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }

        .restart-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6644, #ff4466);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
            transition: transform 0.2s;
            box-shadow: 0 0 20px rgba(255,68,68,0.5);
            font-family: monospace;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 700px) {
            .info-card { font-size: 10px; padding: 6px 12px; }
            .score-card { font-size: 20px; padding: 6px 16px; }
            .message { font-size: 12px; padding: 8px 16px; white-space: nowrap; bottom: 20%; }
            .controls-tip { font-size: 10px; }
            .restart-btn { padding: 8px 18px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-panel">
        <div class="info-card">
            ⚡ 地脉波动 · 唯一安全区 ⚡
        </div>
        <div class="score-card">
            ⏱️ <span id="scoreValue">0</span> 秒
        </div>
    </div>
    <div class="message" id="message">
        🎮 WASD 或 鼠标移动 控制光球
    </div>
    <div class="controls-tip">
        🕹️ WASD 移动 | 🖱️ 鼠标移动 | 躲进金色光环
    </div>
    <button class="restart-btn" id="restartBtn">✨ 重新开始 ✨</button>
</div>

<script>
    (function() {
        // 获取canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;

        // 游戏状态
        let player = { x: 0, y: 0 };
        let targetX = 0, targetY = 0;
        let safeZone = { x: 0, y: 0 };
        let isAlive = true;
        let surviveTime = 0;
        let lastTimestamp = 0;

        // 波动攻击数据
        let waves = [];
        let waveTime = 0;

        // 键盘控制
        const keys = {
            w: false, s: false, a: false, d: false,
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
        };

        // 安全区刷新计时
        let nextSafeChange = 0;

        // ========== 事件绑定 ==========
        window.addEventListener('load', () => {
            resizeCanvas();

            // 键盘事件
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                // 防止页面滚动
                if (key === 'w' || key === 'W' || key === 's' || key === 'S' ||
                    key === 'a' || key === 'A' || key === 'd' || key === 'D' ||
                    key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') {
                    e.preventDefault();
                }

                if (key === 'w' || key === 'W') keys.w = true;
                if (key === 's' || key === 'S') keys.s = true;
                if (key === 'a' || key === 'A') keys.a = true;
                if (key === 'd' || key === 'D') keys.d = true;
                if (key === 'ArrowUp') keys.ArrowUp = true;
                if (key === 'ArrowDown') keys.ArrowDown = true;
                if (key === 'ArrowLeft') keys.ArrowLeft = true;
                if (key === 'ArrowRight') keys.ArrowRight = true;

                console.log('按键:', key, keys); // 调试
            });

            window.addEventListener('keyup', (e) => {
                const key = e.key;
                if (key === 'w' || key === 'W') keys.w = false;
                if (key === 's' || key === 'S') keys.s = false;
                if (key === 'a' || key === 'A') keys.a = false;
                if (key === 'd' || key === 'D') keys.d = false;
                if (key === 'ArrowUp') keys.ArrowUp = false;
                if (key === 'ArrowDown') keys.ArrowDown = false;
                if (key === 'ArrowLeft') keys.ArrowLeft = false;
                if (key === 'ArrowRight') keys.ArrowRight = false;
            });

            // 鼠标移动控制
            canvas.addEventListener('mousemove', (e) => {
                if (!isAlive) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = width / rect.width;
                const scaleY = height / rect.height;
                let mouseX = (e.clientX - rect.left) * scaleX;
                let mouseY = (e.clientY - rect.top) * scaleY;
                // 映射到游戏区域 [-5,5] 范围
                const gameX = (mouseX / width) * 12 - 6;
                const gameY = (mouseY / height) * 10 - 5;
                targetX = Math.min(5.2, Math.max(-5.2, gameX));
                targetY = Math.min(4.2, Math.max(-4.2, gameY));
            });

            // 触摸屏支持
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isAlive) return;
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const scaleX = width / rect.width;
                const scaleY = height / rect.height;
                let touchX = (touch.clientX - rect.left) * scaleX;
                let touchY = (touch.clientY - rect.top) * scaleY;
                const gameX = (touchX / width) * 12 - 6;
                const gameY = (touchY / height) * 10 - 5;
                targetX = Math.min(5.2, Math.max(-5.2, gameX));
                targetY = Math.min(4.2, Math.max(-4.2, gameY));
            });
            canvas.addEventListener('touchstart', (e) => e.preventDefault());

            // 重启按钮
            document.getElementById('restartBtn').addEventListener('click', () => {
                restartGame();
            });

            // 窗口大小变化
            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            // 启动游戏
            restartGame();
            requestAnimationFrame(gameLoop);
        });

        function resizeCanvas() {
            const container = canvas.parentElement;
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        // 重启游戏
        function restartGame() {
            isAlive = true;
            surviveTime = 0;
            document.getElementById('scoreValue').innerText = "0";
            player.x = 0;
            player.y = 0;
            targetX = 0;
            targetY = 0;
            waveTime = 0;

            // 随机初始安全区
            safeZone.x = (Math.random() - 0.5) * 8;
            safeZone.y = (Math.random() - 0.5) * 6;
            safeZone.x = Math.min(4.8, Math.max(-4.8, safeZone.x));
            safeZone.y = Math.min(3.8, Math.max(-3.8, safeZone.y));

            nextSafeChange = performance.now() / 1000 + 4.5;

            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = '✨ 快躲进金色光环！ ✨';
            msgDiv.style.color = '#ffaa66';
        }

        // 更新安全区位置
        function updateSafeZone(now) {
            if (now >= nextSafeChange) {
                safeZone.x = (Math.random() - 0.5) * 9;
                safeZone.y = (Math.random() - 0.5) * 7;
                safeZone.x = Math.min(5, Math.max(-5, safeZone.x));
                safeZone.y = Math.min(4.2, Math.max(-4.2, safeZone.y));
                nextSafeChange = now + 4 + Math.random() * 3;

                // 闪烁提示
                const msgDiv = document.getElementById('message');
                msgDiv.innerHTML = '⚠️ 安全区转移了！快找新的！ ⚠️';
                msgDiv.style.color = '#ff8866';
                setTimeout(() => {
                    if (isAlive) {
                        msgDiv.innerHTML = '🏃 快移动！躲进金色光环 🏃';
                        msgDiv.style.color = '#ffaa66';
                    }
                }, 1500);
            }
        }

        // 计算地面波动高度（用于视觉效果和伤害判定）
        function getGroundHeight(x, y, time) {
            let height = 0;
            // 多个波动源
            const sources = [
                { cx: Math.sin(time * 0.4) * 4, cy: Math.cos(time * 0.5) * 3, amp: 0.6, freq: 1.8 },
                { cx: Math.sin(time * 0.7 + 2) * 3.5, cy: Math.cos(time * 0.6) * 3.2, amp: 0.55, freq: 2.0 },
                { cx: Math.cos(time * 0.55) * 4.5, cy: Math.sin(time * 0.65) * 3.8, amp: 0.5, freq: 1.6 },
                { cx: Math.sin(time * 0.9) * 3, cy: Math.cos(time * 0.8) * 2.8, amp: 0.45, freq: 2.2 }
            ];

            for (const s of sources) {
                const dx = x - s.cx;
                const dy = y - s.cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const influence = Math.max(0, 1 - dist / 4);
                const wave = Math.sin(dist * s.freq - time * 3) * s.amp * influence;
                height += wave;
            }

            // 安全区保护
            const dxSafe = x - safeZone.x;
            const dySafe = y - safeZone.y;
            const distSafe = Math.sqrt(dxSafe*dxSafe + dySafe*dySafe);
            if (distSafe < 1.2) {
                const factor = Math.min(1, distSafe / 1.2);
                height = height * factor * 0.15;
            } else {
                height = Math.min(0.8, Math.max(-0.5, height));
                height += Math.sin(x * 2 + time * 4) * 0.08;
                height += Math.cos(y * 2.2 + time * 3.5) * 0.08;
            }

            return height;
        }

        // 检查是否在安全区
        function isInSafeZone() {
            const dx = player.x - safeZone.x;
            const dy = player.y - safeZone.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            return dist < 1.2;
        }

        // 移动玩家
        function movePlayer(deltaTime) {
            if (!isAlive) return;

            let moveX = 0, moveY = 0;
            if (keys.w || keys.ArrowUp) moveY -= 1;
            if (keys.s || keys.ArrowDown) moveY += 1;
            if (keys.a || keys.ArrowLeft) moveX -= 1;
            if (keys.d || keys.ArrowRight) moveX += 1;

            const speed = 7.5;
            if (moveX !== 0 || moveY !== 0) {
                const len = Math.hypot(moveX, moveY);
                moveX /= len;
                moveY /= len;
                targetX += moveX * speed * deltaTime;
                targetY += moveY * speed * deltaTime;
            }

            // 边界限制
            targetX = Math.min(5.5, Math.max(-5.5, targetX));
            targetY = Math.min(4.5, Math.max(-4.5, targetY));

            // 平滑移动
            player.x += (targetX - player.x) * 0.35;
            player.y += (targetY - player.y) * 0.35;
        }

        // 绘制游戏
        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);

            // 背景渐变
            const grad = ctx.createLinearGradient(0, 0, width, height);
            grad.addColorStop(0, '#0a0520');
            grad.addColorStop(1, '#010008');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            // 绘制网格线
            ctx.save();
            ctx.globalAlpha = 0.2;
            ctx.strokeStyle = '#8a6eff';
            ctx.lineWidth = 1;
            const stepX = width / 12;
            const stepY = height / 10;
            for (let i = 0; i <= 12; i++) {
                ctx.beginPath();
                ctx.moveTo(i * stepX, 0);
                ctx.lineTo(i * stepX, height);
                ctx.stroke();
            }
            for (let i = 0; i <= 10; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * stepY);
                ctx.lineTo(width, i * stepY);
                ctx.stroke();
            }
            ctx.restore();

            // 绘制波动地面效果（热力图风格）
            const cellW = width / 40;
            const cellH = height / 34;
            for (let i = 0; i < 40; i++) {
                for (let j = 0; j < 34; j++) {
                    const worldX = (i / 40) * 12 - 6;
                    const worldY = (j / 34) * 9 - 4.5;
                    const heightVal = getGroundHeight(worldX, worldY, waveTime);
                    const intensity = Math.min(0.8, Math.abs(heightVal) * 1.2);
                    if (intensity > 0.1) {
                        const isDanger = heightVal > 0.3 || heightVal < -0.2;
                        ctx.fillStyle = isDanger ? `rgba(255, 68, 68, ${intensity * 0.4})` : `rgba(100, 68, 200, ${intensity * 0.3})`;
                        ctx.fillRect(i * cellW, j * cellH, cellW + 1, cellH + 1);
                    }
                }
            }

            // 绘制安全区 (金色光环)
            const safeScreenX = ((safeZone.x + 6) / 12) * width;
            const safeScreenY = ((safeZone.y + 4.5) / 9) * height;

            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ffaa44';
            // 外圈
            ctx.beginPath();
            ctx.arc(safeScreenX, safeScreenY, 35, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 170, 68, 0.2)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(safeScreenX, safeScreenY, 28, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 200, 100, 0.3)';
            ctx.fill();
            // 光柱效果
            for (let i = 0; i < 12; i++) {
                const angle = Date.now() * 0.005 + i * Math.PI / 6;
                const x2 = safeScreenX + Math.cos(angle) * 38;
                const y2 = safeScreenY + Math.sin(angle) * 38;
                ctx.beginPath();
                ctx.moveTo(safeScreenX, safeScreenY);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `rgba(255, 200, 100, 0.5)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            // 中心光环
            ctx.beginPath();
            ctx.arc(safeScreenX, safeScreenY, 18, 0, Math.PI * 2);
            ctx.fillStyle = '#ffaa55';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(safeScreenX, safeScreenY, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#ffdd99';
            ctx.fill();
            ctx.restore();

            // 绘制玩家
            const playerScreenX = ((player.x + 6) / 12) * width;
            const playerScreenY = ((player.y + 4.5) / 9) * height;

            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#66ccff';
            ctx.beginPath();
            ctx.arc(playerScreenX, playerScreenY, 20, 0, Math.PI * 2);
            ctx.fillStyle = isAlive ? 'rgba(100, 200, 255, 0.8)' : 'rgba(255, 68, 68, 0.8)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(playerScreenX, playerScreenY, 12, 0, Math.PI * 2);
            ctx.fillStyle = isAlive ? '#88ddff' : '#ff6688';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(playerScreenX, playerScreenY, 6, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.restore();

            // 安全区文字
            ctx.font = 'bold 14px monospace';
            ctx.fillStyle = '#ffdd99';
            ctx.shadowBlur = 0;
            ctx.fillText('⚜️ 唯一安全区 ⚜️', safeScreenX - 65, safeScreenY - 28);
        }

        // 主循环
        let lastTime = performance.now() / 1000;

        function gameLoop() {
            const now = performance.now() / 1000;
            let delta = Math.min(0.033, now - lastTime);
            if (delta < 0.01) delta = 0.016;
            lastTime = now;

            if (isAlive) {
                // 更新时间
                surviveTime += delta;
                document.getElementById('scoreValue').innerText = Math.floor(surviveTime);

                // 更新波动时间
                waveTime += delta * 1.3;

                // 移动玩家
                movePlayer(delta);

                // 更新安全区
                updateSafeZone(now);

                // 检查是否在安全区
                const inSafe = isInSafeZone();
                const msgDiv = document.getElementById('message');

                if (!inSafe) {
                    // 不在安全区，受到伤害判定
                    const groundH = Math.abs(getGroundHeight(player.x, player.y, waveTime));
                    if (groundH > 0.35) {
                        isAlive = false;
                        msgDiv.innerHTML = '💀 被地脉波动吞噬 💀';
                        msgDiv.style.color = '#ff6666';
                    } else {
                        const dist = Math.hypot(player.x - safeZone.x, player.y - safeZone.y);
                        if (dist > 2.2) {
                            msgDiv.innerHTML = '⚠️ 远离安全区！快回去！ ⚠️';
                            msgDiv.style.color = '#ff8866';
                        } else if (dist > 1.4) {
                            msgDiv.innerHTML = '🔔 接近安全区... 加速！';
                            msgDiv.style.color = '#ffcc88';
                        } else {
                            msgDiv.innerHTML = '🏃 快进入金色光环！ 🏃';
                            msgDiv.style.color = '#ffaa66';
                        }
                    }
                } else {
                    msgDiv.innerHTML = '✅ 安全区内 · 波动退散 ✅';
                    msgDiv.style.color = '#aaffaa';
                }
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        console.log('游戏已启动，使用 WASD 或 鼠标移动！');
    })();
</script>
</body>
</html>
