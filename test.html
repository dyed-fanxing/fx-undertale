<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于时间的自动消散拖尾</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #000; color: #fff; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(30,30,40,0.9); padding: 15px; border-radius: 10px; width: 250px; }
        .slider-container { margin: 10px 0; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input[type=range] { width: 100%; }
        .value { font-size: 12px; color: #88c; }
        button { padding: 10px; margin:5px; width:100%; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #666; }
    </style>
</head>
<body>

<div id="info">
    <h3>🎯 基于时间的自动消散拖尾</h3>
    <p>1. 点击"开始动画"记录轨迹<br>
        2. 点击"停止动画"观察旧点随时间自动消失<br>
        3. 无需控制进度，只由时间决定生死</p>
</div>

<div id="controls">
    <div class="slider-container">
        <label>条带宽度 <span id="widthVal" class="value">0.20</span></label>
        <input type="range" id="width" min="0.05" max="0.5" value="0.20" step="0.01">
    </div>
    <div class="slider-container">
        <label>最大寿命(秒) <span id="lifeVal" class="value">1.0</span></label>
        <input type="range" id="lifetime" min="0.3" max="3.0" value="1.0" step="0.1">
    </div>
    <div class="slider-container">
        <label>运动速度 <span id="speedVal" class="value">1.5</span></label>
        <input type="range" id="speed" min="0" max="3" value="1.5" step="0.1">
    </div>
    <button id="startBtn">开始动画 (记录点)</button>
    <button id="stopBtn">停止动画 (仅播放消散)</button>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // 场景初始化
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    camera.position.set(3, 4, 5);
    camera.lookAt(0, 0, 0);

    // 简单光照
    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    // 地板
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.MeshStandardMaterial({ color: 0x222222 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // 控制参数
    const params = {
        width: 0.2,
        maxLifetime: 1.0, // 点存活的秒数
        moveSpeed: 1.5
    };

    // UI 控制
    document.getElementById('width').addEventListener('input', (e) => {
        params.width = parseFloat(e.target.value);
        document.getElementById('widthVal').textContent = params.width.toFixed(2);
    });

    document.getElementById('lifetime').addEventListener('input', (e) => {
        params.maxLifetime = parseFloat(e.target.value);
        document.getElementById('lifeVal').textContent = params.maxLifetime.toFixed(1);
    });

    document.getElementById('speed').addEventListener('input', (e) => {
        params.moveSpeed = parseFloat(e.target.value);
        document.getElementById('speedVal').textContent = params.moveSpeed.toFixed(1);
    });

    // 拖尾系统 (核心逻辑)
    class TimeBasedTrail {
        constructor() {
            this.points = []; // 存储 { position, timestamp }
            this.geometry = new THREE.BufferGeometry();
            this.material = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, linewidth: 5 });
            this.line = new THREE.Line(this.geometry, this.material);
            scene.add(this.line);
        }

        // 添加一个点（带当前时间）
        addPoint(position) {
            this.points.push({
                pos: position.clone(),
                time: performance.now() // 记录此刻的时间戳
            });
        }

        // 更新：根据当前时间剔除旧点，并刷新网格
        update() {
            const now = performance.now();
            const trailColor = new THREE.Color(0xffaa00);

            // 1. 清理过期的点（只保留存活期内的点）
            // maxLifetime 是存活秒数，转换为毫秒比较
            const cutoffTime = now - (params.maxLifetime * 1000);
            // 保留时间大于 cutoffTime 的点（即较新的点）
            this.points = this.points.filter(point => point.time > cutoffTime);

            // 2. 如果点不够，直接返回（并清空几何体）
            if (this.points.length < 2) {
                this.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array([]), 3));
                return;
            }

            // 3. 构建顶点数据 (Line模式简单演示，实际项目中建议用TriangleStrip)
            const positions = [];
            const colors = [];

            for (let i = 0; i < this.points.length; i++) {
                const pointData = this.points[i];
                const pos = pointData.pos;
                positions.push(pos.x, pos.y + 0.1, pos.z); // 稍微抬高一点避免穿模

                // 计算该点的年龄 (0 = 刚刚出生, 1 = 即将死亡)
                const age = (now - pointData.time) / (params.maxLifetime * 1000);
                const lifeRatio = Math.max(0, Math.min(1, age)); // 限制在 0~1

                // 颜色：根据寿命插值 (新点亮，旧点暗/透明)
                // 这里简单用 alpha 混合
                colors.push(trailColor.r, trailColor.g, trailColor.b);
            }

            // 更新几何体
            this.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            this.geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));

            // 动态设置 Line 的颜色属性（如果材质支持）
            // 这里为了简单，只改整体透明度示意
            this.material.transparent = true;
            // this.material.opacity = 0.8; // 如果需要整体闪烁可在这里改
        }

        clear() {
            this.points = [];
        }
    }

    // 实例化拖尾
    const trail = new TimeBasedTrail();

    // 运动物体 (小球)
    const ballGeometry = new THREE.SphereGeometry(0.2, 16, 16);
    const ballMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const ball = new THREE.Mesh(ballGeometry, ballMaterial);
    scene.add(ball);

    // 动画控制标志
    let isRecording = false;
    let angle = 0;

    document.getElementById('startBtn').onclick = () => {
        isRecording = true;
        console.log("开始记录轨迹...");
    };

    document.getElementById('stopBtn').onclick = () => {
        isRecording = false;
        console.log("停止记录。旧点将随时间自动消失...");
    };

    // 动画循环
    function animate() {
        requestAnimationFrame(animate);

        const delta = 0.016; // 简单的 deltaTime
        const now = performance.now();

        // 1. 逻辑更新：小球运动
        if (isRecording) {
            angle += params.moveSpeed * delta;
            const x = Math.cos(angle) * 2;
            const z = Math.sin(angle) * 2;
            ball.position.set(x, 0.1, z);
        }
        // 如果不 recording，ball 位置保持不变

        // 2. 核心：添加点 (只有 recording 时才加)
        if (isRecording) {
            trail.addPoint(ball.position);
        }

        // 3. 核心：更新拖尾 (每帧都执行，自动剔除旧点)
        trail.update();

        renderer.render(scene, camera);
    }

    animate();

    // 窗口自适应
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
