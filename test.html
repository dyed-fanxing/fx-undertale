<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>最终修复：完美连续螺旋</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; user-select: none; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #fff; background: rgba(0, 0, 0, 0.8);
            padding: 20px; border-radius: 8px; border: 1px solid #444;
            pointer-events: none; z-index: 10;
        }
        h1 { margin: 0 0 15px 0; font-size: 16px; color: #00ffcc; text-transform: uppercase; }
        p { margin: 8px 0; font-size: 14px; color: #888; transition: all 0.2s; }
        .active { color: #fff; font-weight: bold; font-size: 16px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .key-hint { color: #ffff00; font-weight: bold; margin-right: 5px; }

        #mode-display {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            font-size: 24px; color: #00ffcc; font-weight: bold;
            text-shadow: 0 0 20px #00ffcc;
            background: rgba(0,0,0,0.6); padding: 10px 30px;
            border-radius: 50px; border: 2px solid #00ffcc;
            pointer-events: none; z-index: 10;
        }
        #click-hint {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.3); font-size: 24px;
            pointer-events: none; text-align: center;
            animation: pulse 2s infinite; z-index: 5;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
        .flash { animation: flashAnim 0.2s ease-out; }
        @keyframes flashAnim { 0% { background-color: rgba(0, 255, 204, 0.3); } 100% { background-color: rgba(0, 0, 0, 0.8); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>
<div id="click-hint">[ 点击画面激活键盘 ]<br>按 1: 蛇形 | 按 5: 完美连续螺旋</div>

<div id="ui">
    <h1>世界规则控制台</h1>
    <p id="m1"><span class="key-hint">[1]</span> 经典蛇形 (Classic Snake)</p>
    <p id="m5"><span class="key-hint">[5]</span> 完美连续螺旋 (Continuous Spiral)</p>
</div>

<div id="mode-display">MODE: 1 - CLASSIC SNAKE</div>

<script>
    const CONFIG = {
        gridSize: 60,
        spacing: 1.0,
        maxSpike: 10.0,
        baseSpeed: 2.0
    };

    let scene, camera, renderer, composer, controls;
    let spikes = [];
    let clock = new THREE.Clock();

    let currentMode = 1;
    let time = 0;
    let spiralRotation = 0;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 45, 55);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.5;
        composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(30, 50, 30);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(2048, 2048);
        scene.add(dirLight);

        createTerrain();

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        window.addEventListener('click', () => {
            document.getElementById('click-hint').style.display = 'none';
            document.body.classList.add('flash');
            setTimeout(() => document.body.classList.remove('flash'), 200);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === '1') setMode(1);
            if (e.key === '5') setMode(5);
            if(e.key >= '1' && e.key <= '5') e.preventDefault();
        });

        window.addEventListener('resize', onWindowResize, false);
        updateUI();
        animate();
    }

    function createTerrain() {
        const geometry = new THREE.BoxGeometry(0.8, 1, 0.8);
        const offset = (CONFIG.gridSize * CONFIG.spacing) / 2;

        for (let x = 0; x < CONFIG.gridSize; x++) {
            for (let z = 0; z < CONFIG.gridSize; z++) {
                const wx = (x * CONFIG.spacing) - offset;
                const wz = (z * CONFIG.spacing) - offset;

                const material = new THREE.MeshStandardMaterial({
                    color: 0x333333, roughness: 0.3, metalness: 0.7,
                    emissive: 0x000000, emissiveIntensity: 0
                });

                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(wx, 0, wz);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData = { x: wx, z: wz };

                scene.add(mesh);
                spikes.push(mesh);
            }
        }
    }

    function setMode(mode) {
        if (currentMode === mode) return;
        currentMode = mode;
        if (mode === 5) spiralRotation = 0;
        updateUI();
    }

    function updateUI() {
        for (let i of [1, 5]) {
            const el = document.getElementById(`m${i}`);
            if (i === currentMode) {
                el.classList.add('active');
                el.style.color = '#00ffcc';
            } else {
                el.classList.remove('active');
                el.style.color = '#888';
            }
        }
        const names = ["", "1 - CLASSIC SNAKE", "", "", "", "5 - CONTINUOUS SPIRAL"];
        const colors = ["", "#00ffcc", "", "", "", "#aa00ff"];
        const display = document.getElementById('mode-display');
        display.innerText = names[currentMode];
        display.style.color = colors[currentMode];
        display.style.borderColor = colors[currentMode];
        display.style.textShadow = `0 0 20px ${colors[currentMode]}`;
    }

    // 核心修复：使用更稳健的距离计算
    function getSpiralMask(x, z, rotation) {
        const r = Math.sqrt(x*x + z*z);
        if (r < 0.1) return 0.0; // 中心点安全

        // 1. 获取当前点的角度 (-PI 到 PI)
        let angle = Math.atan2(z, x);

        // 2. 计算该半径下，螺旋线的“理论角度”
        // 螺旋方程：theta = r * k - rotation
        const k = 0.35; // 螺旋紧密度
        let targetAngle = (r * k - rotation);

        // 3. 关键修复：将角度差归一化到 -PI 到 PI 之间
        // 这确保了在 0/2PI 交界处不会断裂
        let diff = angle - targetAngle;

        // 强制将 diff  wrapping 到 [-PI, PI]
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;

        // 4. 计算垂直于螺旋线的距离
        // 随着半径增大，螺旋线之间的实际弧长距离会变大
        // 为了保持螺旋线宽度视觉上一致，我们需要除以半径相关的因子，或者调整阈值
        // 这里使用弧长距离：distance = angle_diff * radius
        const arcDist = Math.abs(diff) * r;

        // 5. 定义螺旋线的“半宽”
        // 为了让螺旋线在远处不至于太宽而连成一片，也不至于太细看不见
        // 我们让宽度随半径轻微增加，但限制最大值
        const lineWidth = 3.5 + r * 0.05;

        // 6. 使用 smoothstep 生成平滑的掩码
        // 0.0 = 螺旋线中心 (安全), 1.0 = 远离螺旋线 (危险)
        // 参数调整为：从 lineWidth*0.5 开始过渡，到 lineWidth*1.5 结束
        const edge0 = lineWidth * 0.5;
        const edge1 = lineWidth * 1.5;

        const t = Math.max(0, Math.min(1, (arcDist - edge0) / (edge1 - edge0)));
        return t * t * (3 - 2 * t);
    }

    function getNoise(x, z, t) {
        let n = Math.sin(x * 0.15 + t) * Math.cos(z * 0.15 + t);
        n += Math.sin(x * 0.3 - t * 1.5) * 0.5;
        return (n + 1.5) / 2.0;
    }

    function updateLogic(time) {
        if (currentMode === 5) {
            spiralRotation += 0.02; // 旋转速度
        }

        for (let i = 0; i < spikes.length; i++) {
            const spike = spikes[i];
            if (!spike.userData) continue;

            const x = spike.userData.x;
            const z = spike.userData.z;

            let mask = 1.0;

            if (currentMode === 1) {
                // --- 模式 1: 经典蛇形 ---
                const centerX = Math.sin(time * 0.8) * 20;
                const centerZ = Math.cos(time * 0.5) * 20;
                const dist = Math.sqrt((x - centerX)**2 + (z - centerZ)**2);

                const t = Math.max(0, Math.min(1, (dist - 6) / (10 - 6)));
                mask = t * t * (3 - 2 * t);
            }
            else if (currentMode === 5) {
                // --- 模式 5: 完美连续螺旋 (重构算法) ---
                mask = getSpiralMask(x, z, spiralRotation);
            }

            // 计算高度
            const noiseH = getNoise(x, z, time * CONFIG.baseSpeed) * CONFIG.maxSpike;
            let targetH = noiseH * mask;

            // 物理平滑
            const currentH = spike.scale.y;
            const newH = currentH + (targetH - currentH) * 0.15;

            spike.scale.y = Math.max(0.2, newH);
            spike.position.y = spike.scale.y / 2;

            // 颜色逻辑
            const isSafe = mask < 0.3; // 稍微放宽安全阈值以显示更多螺旋线
            let color, emisInt;

            if (isSafe) {
                if (currentMode === 1) color = new THREE.Color(0x004444);
                else if (currentMode === 5) color = new THREE.Color(0xaa00ff);
                emisInt = 0.8 + Math.sin(time * 5 + x) * 0.3;
            } else {
                const hRatio = spike.scale.y / CONFIG.maxSpike;
                color = new THREE.Color().setHSL(0.05 - hRatio * 0.05, 0.9, 0.5);
                emisInt = hRatio * 0.8;
            }

            spike.material.color.copy(color);
            spike.material.emissive.copy(color);
            spike.material.emissiveIntensity = emisInt;
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        time = clock.getElapsedTime();
        updateLogic(time);
        controls.update();
        composer.render();
    }

    init();
</script>
</body>
</html>
