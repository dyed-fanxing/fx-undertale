<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>9 种终极轨迹 · 点数统计版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(15, 15, 20, 0.95); padding: 25px;
            border-radius: 16px; border: 1px solid #333; color: #eee;
            width: 340px; backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            user-select: none;
        }
        h3 { margin: 0 0 20px 0; text-align: center; color: #fff; font-size: 17px; border-bottom: 1px solid #444; padding-bottom: 12px; letter-spacing: 1px; }
        .row { margin-bottom: 18px; }
        label { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
        span.val { color: #ff0055; font-family: 'Consolas', monospace; text-shadow: 0 0 5px rgba(255,0,85,0.4); font-size: 13px; font-weight: bold; }

        select, input[type=range] { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 6px; outline: none; cursor: pointer; transition: 0.2s; }
        select:hover, input[type=range]:hover { border-color: #ff0055; box-shadow: 0 0 8px rgba(255,0,85,0.2); }
        input[type=range] { -webkit-appearance: none; height: 6px; background: #333; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #ff0055; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #ff0055; }

        .desc { font-size: 11px; color: #888; margin-top: 6px; line-height: 1.4; font-style: italic; border-left: 2px solid #ff0055; padding-left: 8px; min-height: 45px;}

        .stats-box {
            margin-top: 15px; padding: 15px; background: #111; border-radius: 8px;
            border: 1px solid #444; text-align: center;
        }
        .stats-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stats-value { font-size: 24px; color: #00ffcc; font-family: 'Consolas', monospace; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,204,0.4); }
        .stats-sub { font-size: 10px; color: #666; margin-top: 4px; }

        .status-bar {
            margin-top: 15px; padding: 12px; background: #1a1a1a; border-radius: 8px;
            text-align: center; font-size: 12px; color: #999; border: 1px solid #333; font-weight: bold;
        }
        .status-bar.active { color: #ff0055; border-color: #ff0055; background: rgba(255, 0, 85, 0.05); }

        button {
            width: 100%; padding: 14px; background: #333; color: #fff; border: 1px solid #555;
            border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; margin-top: 10px;
            transition: 0.2s;
        }
        button:hover { background: #ff0055; color: #fff; border-color: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.5); }
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="ui">
    <h3>🎨 9 种终极轨迹</h3>

    <div class="row">
        <label>轨迹形态</label>
        <select id="curveType">
            <option value="radial">径向直刺 (Radial Spear)</option>
            <option value="spiral">经典螺旋 (Classic Spiral)</option>
            <option value="fractal">分形折叠 (Fractal Fold)</option>
            <option value="brownian">布朗漂移 (Brownian)</option>
            <option value="vortex">涡旋湍流 (Vortex)</option>
            <option value="magnetic">磁斥力场 (Magnetic)</option>
            <option value="flower">花瓣轨道 (Flower)</option>
            <option value="dna">DNA 双螺旋 (DNA Helix)</option>
            <option value="fibonacci">斐波那契金螺 (Fibonacci)</option>
            <option value="pulse">脉冲神经 (Pulse Neural)</option>
        </select>
        <div class="desc" id="desc">9 种模式，含生物、自然与神经模拟。</div>
    </div>

    <div class="row">
        <label>骨刺数量 (1-20) <span id="v-count">10</span></label>
        <input type="range" id="count" min="1" max="20" step="1" value="10">
    </div>

    <div class="row">
        <label>运动速度 <span id="v-speed">1.5</span></label>
        <input type="range" id="speed" min="0.5" max="4.0" step="0.1" value="1.5">
    </div>

    <div class="row">
        <label>扰动/强度 <span id="v-wobble">0.5</span></label>
        <input type="range" id="wobble" min="0" max="4.0" step="0.1" value="0.5">
        <div class="desc" id="wobbleDesc">动态参数控制。</div>
    </div>

    <div class="row">
        <label>色彩风格</label>
        <select id="colorMode">
            <option value="neon_rainbow">霓虹彩虹 (Neon Rainbow)</option>
            <option value="cyber_pink">赛博粉紫 (Cyber Pink)</option>
            <option value="electric_green">电光绿 (Electric Green)</option>
            <option value="gold_leaf">金箔质感 (Gold Leaf)</option>
        </select>
    </div>

    <!-- 点数统计模块 -->
    <div class="stats-box">
        <div class="stats-label">🔢 当前渲染总点数</div>
        <div class="stats-value" id="pointCount">0</div>
        <div class="stats-sub">单位：独立骨刺节段 (Points)</div>
    </div>

    <div class="status-bar" id="statusBar">⏸️ 准备就绪</div>
    <button id="startBtn">▶️ 开始演译</button>
</div>

<canvas id="c"></canvas>

<script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    let W, H, CX, CY;

    const state = {
        curveType: 'radial',
        count: 10,
        speed: 1.5,
        wobbleAmt: 0.5,
        colorMode: 'neon_rainbow',
        isRunning: false,
        bones: [],
        totalPoints: 0
    };

    const descs = {
        radial: "绝对直线。拉大'扰动'可模拟蛇形。",
        spiral: "经典阿基米德螺旋，平滑卷入。",
        fractal: "折线跳跃，棱角分明。",
        brownian: "随机抖动，微观粒子感。",
        vortex: "台风眼效应，内圈极速旋转。",
        magnetic: "磁斥力避让，沿边缘滑行。",
        flower: "玫瑰线几何，完美花瓣嵌套。",
        dna: "双链交错，模拟生物 DNA 结构向心汇聚。",
        fibonacci: "黄金角度排列，自然界最完美的生长轨迹。",
        pulse: "离散跳跃，模拟神经电信号脉冲。"
    };

    const wobbleDescs = {
        radial: "控制左右摆动幅度。",
        spiral: "控制螺旋紧密度。",
        fractal: "控制折叠角度。",
        brownian: "控制抖动剧烈度。",
        vortex: "控制旋转加速度。",
        magnetic: "控制磁场排斥力。",
        flower: "控制花瓣数量。",
        dna: "控制双螺旋的螺距。",
        fibonacci: "控制发散角度微调。",
        pulse: "控制脉冲跳跃的间隔长度。"
    };

    document.getElementById('curveType').onchange = e => {
        state.curveType = e.target.value;
        document.getElementById('desc').innerText = descs[state.curveType];
        updateWobbleDesc();
        resetSimulation();
    };

    function updateWobbleDesc() {
        document.getElementById('wobbleDesc').innerText = wobbleDescs[state.curveType];
    }

    ['count','speed','wobble'].forEach(k => {
        const el = document.getElementById(k);
        const key = k === 'wobble' ? 'wobbleAmt' : k;
        el.oninput = e => {
            state[key] = parseFloat(e.target.value);
            document.getElementById('v-'+k).innerText = state[key].toFixed(1);
            if(!state.isRunning && k !== 'speed') resetSimulation();
        };
    });

    document.getElementById('colorMode').onchange = e => {
        state.colorMode = e.target.value;
        if(!state.isRunning) draw();
    };

    const startBtn = document.getElementById('startBtn');
    const statusBar = document.getElementById('statusBar');
    const pointCountEl = document.getElementById('pointCount');

    startBtn.onclick = () => {
        if(state.isRunning) return;
        startSimulation();
    };

    function resize() {
        W = c.width = window.innerWidth;
        H = c.height = window.innerHeight;
        CX = W/2; CY = H/2;
        if(!state.isRunning) draw();
    }
    window.onresize = resize;
    resize();

    // --- 核心：9 种轨迹生成逻辑 ---
    function generatePaths() {
        const bones = [];
        const maxR = Math.min(W, H) * 0.45;
        // 基础步数，脉冲模式下会视觉减少，但逻辑点不变
        const totalSteps = 120;

        for (let i = 0; i < state.count; i++) {
            const points = [];
            const baseAngle = (Math.PI * 2 * i) / state.count;

            let noiseAccumulator = 0;

            for (let t = 0; t <= totalSteps; t++) {
                const progress = t / totalSteps;
                let x, y, angle;
                const currentR = maxR * (1 - progress);

                // --- 模式逻辑 ---
                if (state.curveType === 'radial') {
                    const theta = baseAngle;
                    const waveFreq = 8;
                    const waveAmp = state.wobbleAmt * 30 * (1 - progress);
                    const offset = Math.sin(progress * Math.PI * waveFreq + i) * waveAmp;
                    const bx = CX + Math.cos(theta) * currentR;
                    const by = CY + Math.sin(theta) * currentR;
                    x = bx + Math.cos(theta + Math.PI/2) * offset;
                    y = by + Math.sin(theta + Math.PI/2) * offset;
                    angle = theta + Math.PI;
                }
                else if (state.curveType === 'spiral') {
                    const rotations = 2 + state.wobbleAmt * 3;
                    const theta = baseAngle + (progress * rotations * Math.PI * 2);
                    x = CX + Math.cos(theta) * currentR;
                    y = CY + Math.sin(theta) * currentR;
                    angle = theta + Math.PI/2 + Math.PI;
                }
                else if (state.curveType === 'fractal') {
                    const segments = 5;
                    const segIdx = Math.floor(progress * segments);
                    const turnDir = (i % 2 === 0) ? 1 : -1;
                    const foldAngle = (Math.PI / 6) * (1 + state.wobbleAmt);
                    const segmentAngle = baseAngle + (segIdx * foldAngle * turnDir);
                    const rStart = maxR * (1 - segIdx/segments);
                    const rEnd = maxR * (1 - (segIdx+1)/segments);
                    const r = rStart + (rEnd - rStart) * ((progress * segments) % 1);
                    x = CX + Math.cos(segmentAngle) * r;
                    y = CY + Math.sin(segmentAngle) * r;
                    angle = segmentAngle + Math.PI;
                }
                else if (state.curveType === 'brownian') {
                    noiseAccumulator += (Math.random() - 0.5) * state.wobbleAmt * 0.2;
                    const theta = baseAngle + noiseAccumulator * (1 - progress * 0.5);
                    const jitter = (Math.random() - 0.5) * state.wobbleAmt * 10;
                    x = CX + Math.cos(theta) * (currentR + jitter);
                    y = CY + Math.sin(theta) * (currentR + jitter);
                    angle = theta + Math.PI;
                }
                else if (state.curveType === 'vortex') {
                    const rNorm = currentR / maxR;
                    const safeR = Math.max(rNorm, 0.05);
                    const intensity = 1 + state.wobbleAmt * 4;
                    const theta = baseAngle + intensity * Math.log(1 / safeR);
                    x = CX + Math.cos(theta) * currentR;
                    y = CY + Math.sin(theta) * currentR;
                    angle = theta + Math.PI/2 + Math.PI;
                }
                else if (state.curveType === 'magnetic') {
                    const distToCenter = currentR;
                    const repulsionStrength = state.wobbleAmt * 500;
                    const pushAngle = repulsionStrength / (distToCenter + 10);
                    const direction = (i % 2 === 0) ? 1 : -1;
                    const theta = baseAngle + (direction * pushAngle * (1-progress));
                    x = CX + Math.cos(theta) * currentR;
                    y = CY + Math.sin(theta) * currentR;
                    angle = theta + Math.PI/2 * direction + Math.PI;
                }
                else if (state.curveType === 'flower') {
                    const k = 3 + Math.floor(state.wobbleAmt * 4);
                    const thetaSpeed = 2 * Math.PI * 2;
                    const theta = baseAngle + progress * thetaSpeed;
                    const factor = Math.abs(Math.cos(k * theta));
                    const rEff = currentR * factor;
                    x = CX + Math.cos(theta) * rEff;
                    y = CY + Math.sin(theta) * rEff;
                    angle = theta + Math.PI/2;
                }
                else if (state.curveType === 'dna') {
                    // 双螺旋：两根链，相位差 PI
                    // 这里我们让每根骨刺代表双链中的一股，或者单根骨刺自身呈现双链波动？
                    // 方案：单根骨刺呈现正弦波动，且相邻骨刺相位相反，形成视觉上的双链交织
                    const helixFreq = 2 + state.wobbleAmt * 2;
                    // 相位偏移：偶数 i 为 0，奇数 i 为 PI
                    const phase = (i % 2 === 0) ? 0 : Math.PI;

                    // 半径本身在缩小，我们在切向做正弦波动来模拟螺旋的投影
                    // 或者更直接：极径 r 不变（按进度缩小），角度 theta 做正弦变化？
                    // 真正的 DNA 投影：x = R*cos(t), y = R*sin(t)*cos(k*t) ?
                    // 简化为：角度随时间线性增加，半径随时间线性减小，但在 Y 轴（或径向）叠加正弦

                    const theta = baseAngle + (progress * 1.5 * Math.PI); // 基础旋转
                    // 径向的正弦波动，模拟双链的起伏
                    const wave = Math.sin(progress * Math.PI * helixFreq + phase) * (state.wobbleAmt * 20);

                    // 实际上 DNA 是立体的，2D 投影通常是两条交错的线
                    // 我们让骨刺的位置在基础螺旋线上，加上一个垂直于螺旋切线的偏移
                    const baseX = CX + Math.cos(theta) * currentR;
                    const baseY = CY + Math.sin(theta) * currentR;

                    // 偏移量
                    const offset = Math.sin(progress * Math.PI * helixFreq + phase) * (currentR * 0.3 * state.wobbleAmt);

                    x = baseX + Math.cos(theta + Math.PI/2) * offset;
                    y = baseY + Math.sin(theta + Math.PI/2) * offset;
                    angle = theta + Math.PI/2;
                }
                else if (state.curveType === 'fibonacci') {
                    // 斐波那契：黄金角度 137.5
                    const goldenAngle = 2.39996; // radians
                    // 索引 i 在这里不仅仅是角度分布，而是生长顺序
                    // 但我们要的是向心运动。
                    // 方案：保持黄金角度的相对位置，整体缩小
                    // 每个点的角度 = baseIndex * goldenAngle
                    // 这里的 baseAngle 其实应该由 i * goldenAngle 决定，而不是均匀分布
                    const fibTheta = i * goldenAngle;
                    // 随着进度，半径缩小，同时整体缓慢旋转
                    const rotation = progress * Math.PI * 2;
                    const theta = fibTheta + rotation;

                    x = CX + Math.cos(theta) * currentR;
                    y = CY + Math.sin(theta) * currentR;
                    angle = theta + Math.PI/2;
                }
                else if (state.curveType === 'pulse') {
                    // 脉冲：逻辑点都在，但视觉上通过透明度或大小制造“断开”感
                    // 或者：只在特定的 t 值生成有效点？
                    // 为了统计点数准确，我们生成所有点，但在绘制时根据频率隐藏部分
                    // 这里我们在数据层就标记它是否“激活”
                    const pulseFreq = 0.2 + state.wobbleAmt * 0.3; // 脉冲密度
                    const isActive = Math.sin(progress * Math.PI * 20) > (1 - pulseFreq * 2);

                    const theta = baseAngle + (progress * 2 * Math.PI);
                    x = CX + Math.cos(theta) * currentR;
                    y = CY + Math.sin(theta) * currentR;
                    angle = theta + Math.PI/2 + Math.PI;

                    // 将激活状态存入点对象
                    points.push({x, y, angle, progress, r: currentR, active: isActive});
                    continue; // 跳过下面的默认 push
                }

                points.push({x, y, angle, progress, r: currentR, active: true});
            }
            bones.push({ id: i, currentStep: 0, totalSteps, points, finished: false });
        }
        return bones;
    }

    function resetSimulation() {
        state.isRunning = false;
        state.bones = generatePaths();
        startBtn.disabled = false;
        startBtn.innerText = "▶️ 开始演译";
        statusBar.innerText = "⏸️ 准备就绪";
        statusBar.classList.remove('active');
        updateStats(); // 初始化统计
        draw();
    }

    function startSimulation() {
        if(state.isRunning) return;
        state.bones = generatePaths();
        state.isRunning = true;
        startBtn.disabled = true;
        startBtn.innerText = "⏳ 演译中...";
        statusBar.innerText = "🌌 轨迹生成中...";
        statusBar.classList.add('active');
        animate();
    }

    function animate() {
        if(!state.isRunning) return;
        let allFinished = true;
        const stepInc = state.speed * 1.5;
        state.bones.forEach(b => {
            if(!b.finished) {
                b.currentStep += stepInc;
                if(b.currentStep >= b.totalSteps) { b.currentStep = b.totalSteps; b.finished = true; }
                else allFinished = false;
            }
        });
        updateStats(); // 动画中更新统计
        draw();
        if(allFinished) {
            state.isRunning = false;
            startBtn.disabled = false;
            startBtn.innerText = "🔄 再次演译";
            statusBar.innerText = "✅ 完成";
            statusBar.classList.remove('active');
            updateStats();
        } else requestAnimationFrame(animate);
    }

    // --- 核心：点数统计逻辑 ---
    function updateStats() {
        let count = 0;
        state.bones.forEach(bone => {
            // 计算当前这根骨刺渲染了多少个点
            const limit = bone.finished ? bone.points.length : Math.floor(bone.currentStep) + 1;
            for(let i=0; i<limit; i++) {
                // 如果是脉冲模式，只统计 active 的点
                if(bone.points[i].active !== false) {
                    count++;
                } else {
                    // 脉冲模式下不活跃的点不算作“可见点”，但如果您想统计逻辑点，可以去掉这个判断
                    // 这里我们统计“实际渲染出的可见点”
                }
            }
        });
        state.totalPoints = count;
        pointCountEl.innerText = count.toLocaleString();
    }

    function getColor(idx, total, prog) {
        if(state.colorMode === 'neon_rainbow') return `hsla(${(idx/total)*360}, 100%, 60%,`;
        if(state.colorMode === 'cyber_pink') {
            const h = 300 + (idx/total)*60;
            return `hsla(${h}, 90%, 60%,`;
        }
        if(state.colorMode === 'electric_green') return `rgba(0, 255, 150,`;
        if(state.colorMode === 'gold_leaf') {
            const h = 45 + Math.sin(prog * 10)*10;
            const l = 50 + prog * 40;
            return `hsla(${h}, 80%, ${l}%,`;
        }
        return `rgba(255,255,255,`;
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, W, H);

        // 中心光
        const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, 50);
        g.addColorStop(0, 'rgba(255,255,255,0.1)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(CX, CY, 50, 0, Math.PI*2); ctx.fill();

        const len = 16, wid = 4; // 脉冲模式下点更小

        state.bones.forEach(b => {
            const lim = b.finished ? b.points.length : Math.floor(b.currentStep)+1;
            if(lim<2) return;
            for(let i=0; i<lim; i++) {
                const p = b.points[i];

                // 脉冲模式：不活跃的点直接跳过不画
                if(state.curveType === 'pulse' && !p.active) continue;

                const alpha = 0.3 + (i/lim)*0.7;
                const col = getColor(b.id, state.count, p.progress);

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);

                ctx.fillStyle = col + `${alpha})`;
                ctx.shadowColor = col + `${alpha})`;
                ctx.shadowBlur = 8;

                // 脉冲模式下，点变成圆形且更小
                if(state.curveType === 'pulse') {
                    ctx.scale(0.4, 0.4);
                    ctx.beginPath();
                    ctx.arc(0, 0, wid, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    ctx.scale(0.6 + 0.4*(1-p.progress), 0.6 + 0.4*(1-p.progress));
                    ctx.beginPath();
                    ctx.roundRect(-len/2, -wid/2, len, wid, wid/2);
                    ctx.fill();
                }

                ctx.restore();
            }
        });
    }

    // Init
    updateWobbleDesc();
    resetSimulation();
</script>
</body>
</html>
