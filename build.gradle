plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.95'
}

version = mod_version
group = mod_group_id

repositories {
    mavenLocal()
}

base {
    archivesName = archives_name
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

repositories {
    mavenLocal()
    mavenCentral()
    maven { name = 'NeoForged'; url = 'https://maven.neoforged.net/releases' }
    maven { name = 'GeckoLib'; url = 'https://dl.cloudsmith.io/public/geckolib3/geckolib/maven/' }
    maven { name = "KosmX's maven"; url = 'https://maven.kosmx.dev/' }
    maven { name = "RedlanceMinecraft"; url = "https://repo.redlance.org/public" }
    maven { name = "Curios API"; url "https://cursemaven.com" }
    maven { name = "ModMaven mirror"; url = "https://modmaven.dev" }
    maven { name = "Jared's maven"; url = "https://maven.blamejared.com/" }
//    maven { name = "Iris Maven"; url = "https://maven.irisshaders.net/releases/"}
    maven {
        name = "iris maven"; url "https://www.cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
}

dependencies {
    implementation project(':lib')    // 注意：这里 ':' 表示被 includeBuild 的根项目

    // JEI API 声明供编译时使用，而完整的 JEI 工件在运行时使用
    compileOnly "mezz.jei:jei-${minecraft_version}-common-api:${jei_version}"
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge-api:${jei_version}"
    runtimeOnly "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"
    // GECKOLIB ***************************************************************************************************
    implementation "software.bernie.geckolib:geckolib-neoforge-${minecraft_version}:${geckolib_version}"
    implementation("com.zigythebird.playeranim:PlayerAnimationLibNeo:$pal_version") {
        //  排除gson的版本配置，使用neoforge的
        exclude group: 'com.google.code.gson'
        exclude group: 'org.slf4j'
        exclude group: 'it.unimi.dsi', module: 'fastutil'
        exclude group: 'io.netty', module: 'netty-buffer'
    }
    // CURIOS *****************************************************************************************************
    compileOnly "top.theillusivec4.curios:curios-neoforge:${curios_version}+${minecraft_version}"

//    compileOnly "net.irisshaders:iris-api:1.6.0+mc1.20.1"
//    implementation "net.irisshaders.iris:iris-neoforge:${minecraft_version}"
    // 使用 `compileOnly`，因为我们只需要在编译时用到，运行时会由用户自己安装 Iris
    compileOnly "curse.maven:irisshaders-455508:6661598"
}
neoForge {
    version = project.neo_version

    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        data {
            data()
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources'; exclude '**/*.bbmodel' }

// ========== 动态处理 mods.toml 中的依赖声明 ==========
def packagingMode = project.findProperty('packaging') ?: 'dependency'

processResources {
    if (packagingMode == 'dependency') {
        filesMatching('META-INF/neoforge.mods.toml') {
            expand(core_dependency: '''
                [[dependencies.${mod_id}]]
                    modId = "fx_lib"
                    mandatory = true
                    versionRange = "[1.0,2.0)"
                    ordering = "NONE"
                    side = "BOTH"
            ''')
        }
    } else {
        filesMatching('META-INF/neoforge.mods.toml') {
            expand(core_dependency: '')
        }
    }
}

// 生成 mod metadata 的简化版本（如果需要）
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            neo_version_range      : neo_version_range,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : mod_authors,
            mod_description        : mod_description,
            geckolib_version_range : geckolib_version_range,
            pal_version_range      : pal_version_range,
            curios_version         : curios_version,
            curios_version_range   : curios_version_range,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

// ========== 根据打包模式配置构建 ==========
if (packagingMode == 'embed') {
    apply plugin: 'com.github.johnrengelman.shadow'

    tasks.named('jar').configure {
        enabled = false
    }
    shadowJar {
        archiveClassifier.set('')
        configurations = [project.configurations.runtimeClasspath]

        // 内嵌核心库（不重定位，直接合并）
        // 如果想避免与独立核心库冲突，可取消下面注释：
        // relocate 'com.fanxing.lib', 'com.fanxing.mymod.shaded.lib'
        // exclude 'META-INF/neoforge.mods.toml'
        // exclude 'com/fanxing/corelib/FanxingCoreLibMod.class'
    }

    tasks.named('build').configure {
        dependsOn shadowJar
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                artifact shadowJar
            }
        }
        repositories {
            mavenLocal()
        }
    }
} else {
    // dependency 模式
    tasks.named('jar') {
        archiveClassifier.set('')
        exclude '**/*.bbmodel'
    }

    publishing {
        publications {
            mavenJava(MavenPublication) {
                from components.java
            }
        }
        repositories {
            mavenLocal()
        }
    }
}

java {
    withSourcesJar()
}

tasks.named('sourcesJar') {
    exclude '**/*.bbmodel'
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}